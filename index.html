<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskWiiz</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="" href="./images/taskwiiz.png"/>
</head>

<body>
    <header>
        <div>
            <img src="./images/taskwiiz.png" alt="">
        </div>
        <div class="header-text">
            <h1>TaskWiiz</h1>
            <h4>Your daily task handler.</h4>
        </div>
    </header>
    <main>
        <!-- task add section starts -->
         <section class="task-add-section">
            <div class="task-add">
                <input type="date" id="input-date" placeholder="Date">
                <input type="text" id="input-task" placeholder="Task">
                <button id="task-add-button">Add Task</button>
                
            </div>
         </section>
         <section class="task-table-section">
            <table class="task-table">
                <thead>
                    <tr>
                      <th>Date</th>
                      <th>Task</th>
                      <th>Action</th>
                    </tr>
                  </thead>
                <tbody id="content-container">
                    <!-- contents from user -->
                </tbody>
            </table>
            <div>
                <button id="clear-all-button">Clear All</button>
            </div>
         </section>

    </main>

    <script src="./taskwiiz.js"></script>
</body>

</html>
